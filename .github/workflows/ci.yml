# CI ARIA — surface produit VC (rapport / analyse / juge / Telegram / Virtuals / TA).
#
# Choix ASSUMÉ : on ne lance PAS toute la suite ici. Un seul test en échec
# PRÉ-EXISTANT reste connu (test_web_verify_rugby.py — appel réseau live DuckDuckGo,
# hors périmètre, non lié au code). Cette CI verrouille ce qui rapporte — la surface
# produit VC + les capacités clés — et reste VERTE pour que le vert/rouge ait un sens.
#
# Pour élargir : ajouter des fichiers de test ci-dessous à mesure qu'ils sont
# stabilisés. Aucune donnée live / aucun secret n'est requis (tout est mocké).

name: CI — aria-core (surface VC)

on:
  push:
    paths:
      - "packages/aria-core/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "packages/aria-core/**"
      - ".github/workflows/ci.yml"

jobs:
  tests-vc:
    name: Tests surface VC (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/aria-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer aria-core + dépendances de test
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Suite VC (mockée, hors-ligne)
        run: |
          pytest -q \
            tests/test_vc_judge.py \
            tests/test_vc_telegram_and_format.py \
            tests/test_vc_report.py \
            tests/test_vc_analysis.py \
            tests/test_vc_delivery.py \
            tests/test_vc_predictions.py \
            tests/test_virtuals_client.py \
            tests/test_acp_onchain_bonding.py \
            tests/test_ta_levels.py \
            tests/test_chart_render.py \
            tests/test_telegram_format.py \
            tests/test_acp_onchain_project_links.py \
            tests/test_telegram_webhook_dedup.py \
            tests/test_vc_lang_and_concurrency.py \
            tests/test_vc_cache.py \
            tests/test_goplus.py \
            tests/test_candidate_ranking.py \
            tests/test_paper_trader.py \
            tests/test_admin_totp.py \
            tests/test_attestation.py \
            tests/test_opportunity_radar.py \
            tests/test_x402.py \
            tests/test_onchain_anchor.py \
            tests/test_heartbeat_pulse.py \
            tests/test_dossier.py \
            tests/test_telegram_watchlist_command.py \
            tests/test_vc_report_pdf.py \
            tests/test_vc_language_callback.py \
            tests/test_relay_chat.py \
            tests/test_relay_conversation.py \
            tests/test_telegram_claude_addressing.py \
            tests/test_knowledge_inbox.py \
            tests/test_claude_mentor.py \
            tests/test_high_conviction_alerts.py \
            tests/test_sepolia_wallet.py \
            tests/test_sepolia_autonomous.py \
            tests/test_exam.py \
            tests/test_btc_cycles.py \
            tests/test_code_proposal.py \
            tests/test_skill_projects.py \
            tests/test_coherence.py
