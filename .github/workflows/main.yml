name: Quality & Test ARIA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools & dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi

      - name: Formatage avec Black
        run: black --check .

      - name: Linting avec Ruff
        run: ruff check .

      - name: Tests (optionnel)
        run: |
          if [ -f pytest.ini ] || [ -f pyproject.toml ]; then
            python -m pytest || echo "Pas de tests trouvés"
          else
            echo "Aucun test automatique configuré"
          fi

      - name: Rapport final
        if: always()
        run: |
          echo "=== ARIA Quality Report ==="
          echo "✅ Black : Vérifié"
          echo "✅ Ruff  : Vérifié"
          echo "Workflow terminé avec succès"
