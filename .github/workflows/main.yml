name: Quality & Test ARIA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Formatage Black
        run: black --check .

      - name: Linting Ruff
        run: ruff check .

      - name: Rapport final
        if: always()
        run: |
          echo "=== ARIA Quality Report ==="
          echo "Black terminé"
          echo "Ruff terminé"
