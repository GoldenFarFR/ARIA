name: Quality & Test ARIA

on:
  push:
    branches: [main, master]
    paths:
      - "projects/truth-ledger/**"
      - ".github/workflows/main.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "projects/truth-ledger/**"
      - ".github/workflows/main.yml"

defaults:
  run:
    working-directory: projects/truth-ledger

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Black
        run: black --check .

      - name: Pytest
        run: pytest