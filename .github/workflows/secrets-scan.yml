# Scan de secrets — bloque tout push/PR qui introduit un nouveau secret (clé privée,
# token, mot de passe...) codé en dur. Tourne sur TOUT le repo (pas de filtre de chemin,
# contrairement à ci.yml) puisqu'un secret peut apparaître n'importe où.
#
# .secrets.baseline capture l'état AUDITÉ au 09/07 (faux positifs connus : noms de
# variables SECRET_KEY/api_key dans des tests ou du code lisant depuis l'environnement,
# hash de commit dans un HANDOFF, JWT dans le corpus d'attaque security_sim). Toute
# NOUVELLE trouvaille absente du baseline fait échouer le job.
#
# Pour régénérer après un vrai changement légitime :
#   pip install detect-secrets
#   detect-secrets scan --exclude-files '\.venv/' --exclude-files 'node_modules/' \
#     --exclude-files '__pycache__/' --exclude-files '\.git/' --exclude-files 'dist/' \
#     --exclude-files 'build/' --exclude-files '\.next/' --exclude-files 'package-lock\.json' \
#     > .secrets.baseline
# puis auditer les nouvelles entrées (detect-secrets audit .secrets.baseline) avant de commit.
#
# Étape "email hors liste blanche" (incident #139, 12/07) : detect-secrets n'a pas de
# détecteur d'email (pas une donnée à haute entropie, ce n'est pas son terrain) --
# truth_ledger/sync.py avait poussé des conversations Telegram en clair sur main avec des
# commits attribués à l'email réel de l'opérateur. packages/aria-core/scripts/
# check_no_personal_email.py comble ce trou : liste blanche d'adresses de service/identité
# ARIA connues, tout le reste échoue le job. Aucune adresse personnelle n'est jamais
# référencée ici ni dans le script -- liste blanche de ce qui est SÛR, pas de ce qui est
# interdit. Pour ajouter une nouvelle adresse de service légitime : voir
# ALLOWLISTED_EMAILS dans ce script.

name: Security — secret scan

on:
  push:
  pull_request:

jobs:
  detect-secrets:
    name: detect-secrets (baseline diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer detect-secrets
        run: pip install detect-secrets

      - name: Scanner et comparer au baseline audité
        run: |
          detect-secrets scan \
            --exclude-files '\.venv/' \
            --exclude-files 'node_modules/' \
            --exclude-files '__pycache__/' \
            --exclude-files '\.git/' \
            --exclude-files 'dist/' \
            --exclude-files 'build/' \
            --exclude-files '\.next/' \
            --exclude-files 'package-lock\.json' \
            --exclude-files '\.secrets\.baseline' \
            > /tmp/current-scan.json
          python3 -c "
          import json, sys
          with open('.secrets.baseline') as f:
              baseline = json.load(f)['results']
          with open('/tmp/current-scan.json') as f:
              current = json.load(f)['results']
          baseline_hashes = {
              (fname, item['hashed_secret'])
              for fname, items in baseline.items()
              for item in items
          }
          current_hashes = {
              (fname, item['hashed_secret'])
              for fname, items in current.items()
              for item in items
          }
          new_findings = current_hashes - baseline_hashes
          if new_findings:
              print('❌ Nouveau(x) secret(s) potentiel(s) détecté(s), absent(s) du baseline audité :')
              for fname, h in sorted(new_findings):
                  print(f'  - {fname} (hash {h[:12]}...)')
              print()
              print('Si faux positif : régénère .secrets.baseline (voir commentaire du workflow) et commit-le.')
              print('Si vrai secret : retire-le du code, fais tourner la clé/le token compromis.')
              sys.exit(1)
          print('✅ Aucun nouveau secret par rapport au baseline audité.')
          "

      - name: Scanner les emails hors liste blanche (incident #139)
        run: python3 packages/aria-core/scripts/check_no_personal_email.py
