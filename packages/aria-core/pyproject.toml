[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aria-core"
version = "0.1.0"
description = "ARIA ZHC brain — skills, memory, Telegram, capability index (SSOT runtime)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.6.0",
    "python-telegram-bot>=21.0",
    "PyYAML>=6.0.0",
    "Pillow>=11.0.0",
    "requests-oauthlib>=2.0.0",
    "requests>=2.32.0",
    "aiosqlite>=0.20.0",
    "filelock>=3.15.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "pytest-asyncio>=0.24.0"]
vector = ["chromadb>=0.5.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
aria_core = [
    "**/*.yaml",
    "**/*.md",
    "doctrine/**/*",
    "assets/avatar_gallery/*.jpg",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]