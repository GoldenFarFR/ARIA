[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aria-core"
version = "0.1.0"
description = "ARIA ZHC brain — skills, memory, Telegram, capability index (SSOT runtime)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.0",
    "httpcore>=1.0.9",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.6.0",
    "python-telegram-bot>=21.0",
    "PyYAML>=6.0.0",
    "Pillow>=12.3.0",
    "requests-oauthlib>=2.0.0",
    "requests>=2.33.0",
    "aiosqlite>=0.20.0",
    "filelock>=3.20.3",
    "fastapi>=0.115.0",
    "reportlab>=4.2.0",
    "pypdf>=6.13.3",
    "web3>=7.15.0",
    "playwright>=1.48.0",
    "websockets>=14.0",  # #196 -- client WS DexScreener (momentum_websocket.py), lecture seule
]

[project.optional-dependencies]
dev = ["pytest>=9.0.3", "pytest-asyncio>=0.24.0"]
vector = ["lancedb>=0.34.0", "fastembed>=0.8.0", "pyarrow>=25.0.0"]
agent_wallet = ["cdp-sdk>=1.0.0"]
x402 = ["cdp-sdk>=1.0.0", "x402[evm]>=2.15.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
aria_core = [
    "**/*.yaml",
    "**/*.md",
    "doctrine/**/*",
    "assets/avatar_gallery/*.jpg",
    "assets/*.png",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]