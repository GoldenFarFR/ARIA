# Registre des launchpads Base — reconnaissance du contexte de déploiement.
#
# POURQUOI : sur un launchpad (Virtuals, Flaunch, Clanker, Zora, Bankr...), l'autorité
# du contrat (owner/mint) n'est JAMAIS renoncée — elle reste au PROTOCOLE. C'est
# NORMAL et légitime. Rejeter ces tokens pour « fonction mint présente » serait une
# erreur : le mint est piloté par l'infrastructure du launchpad, pas par un dev qui
# peut rug à volonté.
#
# USAGE : on compare le CRÉATEUR (déployeur) d'un token à ces adresses. Match →
# autorité « launchpad » (légitime). La barrière mint est alors neutralisée (le
# contexte explique le mint), sans baisser la garde sur les AUTRES barrières
# (liquidité, concentration, vérifié).
#
# Adresses en minuscules. Sources : docs/recherche-launchpads-base-2026.md + calibrage
# live sur le VPS. `confidence` : high (confirmé) / medium (rapporté, à confirmer).
# ATTENTION : reconnaître un launchpad ne vaut JAMAIS caution du token — un scam peut
# se lancer sur un launchpad. Ça neutralise seulement le faux positif « mint du dev ».

# `norms` : contexte de tokenomics PROPRE au launchpad, pour juger AU CAS PAR CAS
# (jamais un seuil absolu). Ex. sur Virtuals la team détient couramment 15-20 % —
# c'est normal, pas un drapeau rouge. Un fondateur sans argent ne peut pas s'acheter
# d'alloc : 0 % de détention n'est donc pas forcément de la mauvaise foi. ARIA compare
# un token à la norme de SON launchpad, puis justifie l'écart. Champs indicatifs,
# éditables par l'opérateur au fil de ses observations.

launchpads:
  virtuals:
    label: "Virtuals Protocol"
    confidence: high
    addresses:
      - "0xf66dea7b3e897cd44a5a231c61b6b4423d613259"   # Bonding (courbe)
    norms:
      bonding_curve: true
      team_allocation_pct: [15, 20]   # observé opérateur : team ~15-20 % (normal)
      liquidity_note: "liquidité montée par la courbe de bonding (faible au départ, croît)"

  flaunch:
    label: "Flaunch"
    confidence: high
    addresses:
      # 24/07 -- verified live against Flaunch's own SDK source
      # (flaunch-sdk/src/addresses.ts): multiple PositionManager versions
      # coexist on Base. The address below is explicitly commented "only old
      # V1.0: doesn't use FeeEscrow" in that source -- kept here (a deployer
      # match still recognizes it as a legitimate launchpad token) but it is
      # NOT where new launches land (confirmed: 250k+ blocks of its logs
      # contain zero PoolCreated events). V1_2 ("1.3" per the SDK's own
      # GitHub-release comment) is the one actually receiving new launches
      # (services/flaunch.py's discovery scans this one) and V1_1 is kept too
      # for deployer-recognition completeness on tokens launched in between.
      - "0x51bba15255406cfe7099a42183302640ba7dafdc"   # PositionManager V1.0 (old, no FeeEscrow)
      - "0xf785bb58059fab6fb19bdda2cb9078d9e546efdc"   # PositionManager V1.1
      - "0x23321f11a6d44fd1ab790044fdfde5758c902fdc"   # PositionManager V1.2 ("1.3") -- active, used for discovery
    norms:
      bonding_curve: false
      liquidity_note: "Fair Launch prix-fixe 30 min"
      # Diligence 15/07 (issue #29, vérifiée par recherche externe indépendante
      # avant intégration -- Flayer Labs/Joel Strahl, API flaunch-sdk/docs.flaunch.gg,
      # listing FLAY/LBank tous confirmés) : frais de swap 1% en waterfall vers le
      # créateur (jusqu'à 100 wallets/NFT Memestream) -- pas un signal de rug, un
      # mécanisme de revenu créateur natif au protocole.
      swap_fee_pct: 1
      team: "Flayer Labs (Joel Strahl)"

  clanker:
    label: "Clanker"
    confidence: medium
    addresses:
      - "0xe85a59c628f7d27878aceb4bf3b35733630083a9"   # deployer v4
    norms:
      bonding_curve: false
      liquidity_note: "liquide sur DEX dès t=0"

  zora:
    label: "Zora"
    confidence: medium
    addresses:
      - "0x777777751622c0d3258f214f9df38e35bf45baf3"   # ZoraFactory
    norms:
      bonding_curve: false
      liquidity_note: "pool Uniswap V4 dès t=0"
      # Diligence 15/07 (issue #29, vérifié par recherche externe -- Jacob Horne
      # (ex-Coinbase) confirmé co-fondateur, incident "Base is for everyone"
      # confirmé : ~17M$ de capitalisation en moins d'une heure puis -90/95% en
      # quelques heures, avril 2025) : Sniper Tax 99% décroissante sur 10s (anti-bot
      # d'entrée), vesting créateur 5 ans, frais 1% créateur + 0.01% protocole.
      # L'incident illustre le risque de pump viral incontrôlé propre à ce
      # launchpad -- toujours appliquer un filtre anti-pump, jamais juger sur le
      # seul volume/momentum initial.
      sniper_tax_decay: "99% décroissant sur 10s"
      creator_vesting_years: 5
      fee_pct: {creator: 1, protocol: 0.01}

  # Bankr : cité par l'opérateur. Observation : met ÉNORMÉMENT de liquidité sur chaque
  # token lancé -> un seuil de liquidité bas n'a pas de sens ici. Adresse de déploiement
  # à confirmer en live (calibrage VPS) avant activation.
  bankr:
    label: "Bankr"
    confidence: medium
    addresses: []
    norms:
      liquidity_note: "liquidité très élevée par défaut sur chaque lancement (observé opérateur)"

  # Ape.store / Mint.club : cités dans la recherche launchpads (10/07), diligence PAS
  # encore faite (pas d'API de découverte vérifiée en direct, pas d'adresse confirmée
  # BaseScan). Seams documentés volontairement vides — cf. doctrine "profondeur
  # proportionnelle à l'enjeu" : on ne fabrique pas un client ni un registre sur une
  # hypothèse. À enrichir seulement après vraie diligence (docs officielle, modèle de
  # garde, tarification, signaux de légitimité).
  ape_store:
    label: "Ape.store"
    confidence: unverified
    addresses: []
    norms: {}

  mint_club:
    label: "Mint.club"
    confidence: unverified
    addresses: []
    norms: {}
