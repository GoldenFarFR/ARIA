# Graines du carnet d'auto-amélioration d'ARIA (improvement_ledger).
#
# Idées d'upgrades repérées (par l'opérateur ou ARIA) qu'ARIA garde EN MÉMOIRE
# pour les tester et, si elles améliorent la calibration PROUVÉE, se les greffer
# (toujours via une PR validée par un humain — jamais d'auto-fusion dans le cœur).
#
# `ingest_seeds()` les charge dans la table improvement_candidate (idempotent :
# dédoublonnage par titre). Ajouter une graine ici = ARIA s'en souvient au boot.

