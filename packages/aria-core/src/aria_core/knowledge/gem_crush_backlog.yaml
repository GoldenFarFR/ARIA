# Gem Crush — backlog SSOT (boucle incrémentale ARIA)
# Migré depuis docs/gem-crush-assets-sprint.md — owner évite conflits ouvrier/ARIA

version: 1
goal: "Expérience casual premium type Candy Crush sur #poc — releases illimitées ARIA"
unlimited_releases: true

axes:
  polish: "Sprites, cadre, lisibilité HUD"
  progression: "Carte chapitres, niveaux, objectifs"
  juice: "Éclats match, traînées combo, score pop"
  audio: "SFX layers, musique, mix"
  obstacles: "Gelée, blocs, mécaniques niveau"
  tutorial: "Onboarding animé, hints visuels"

waves:
  - id: wave1
    versions: [40, 41]
    title: "Sprites SVG, carte chapitres, chute animée"
    owner: ouvrier
    status: done
  - id: wave2
    versions: [42, 43]
    title: "Juice match, SFX layers, obstacles gelée"
    owner: aria
    status: done
  - id: wave3
    versions: [44, 46]
    title: "Map monde scroll, 20 niveaux scriptés, boosters"
    owner: shared
    status: in_progress
  - id: wave4
    versions: [47]
    title: "Assets illustrés PNG/WebP si budget génération"
    owner: ouvrier
    status: pending
  - id: wave5
    versions: [49, 999]
    title: "Exploration ouverte ARIA — thèmes CSS cycliques sans plafond"
    owner: aria
    status: in_progress

items:
  - id: sprites_svg
    title: "Gemmes illustrées SVG (6 types + spéciaux)"
    axis: polish
    owner: ouvrier
    status: done
    priority: 100
    acceptance:
      - "GemSprite.tsx présent avec 6 bonbons SVG"
      - "Cellules --sprite sur le plateau"
    detect:
      tsx: ["GemSprite", "gem-crush__sprite"]
      css: ["gem-crush__sprite"]

  - id: level_map
    title: "Carte progression chapitres visible"
    axis: progression
    owner: ouvrier
    status: done
    priority: 90
    acceptance:
      - "LevelMap.tsx + chapters.ts branchés"
      - "Nœuds actif / verrouillé / terminé"
    detect:
      tsx: ["LevelMap", "chapterForLevel"]
      css: ["gem-crush__map"]

  - id: column_fall
    title: "Chute colonne animée après match"
    axis: juice
    owner: ouvrier
    status: done
    priority: 85
    acceptance:
      - "Animation gem-fall-in avec --fall-rows"
    detect:
      css: ["gem-fall-in", "gem-crush__cell--falling"]

  - id: juice_burst
    title: "Particules éclat sur pop match"
    axis: juice
    owner: aria
    status: pending
    priority: 80
    acceptance:
      - "Animation gem-burst sur .gem-crush__cell--pop"
      - "Effet visible sur #poc après match 3+"
    detect:
      css: ["gem-burst", "v41 burst"]

  - id: combo_trail
    title: "Traînée combo sur plateau"
    axis: juice
    owner: aria
    status: pending
    priority: 75
    acceptance:
      - "data-combo sur board-wrap"
      - "sparkle-burst ou équivalent sur combo"
    detect:
      css: ["sparkle-burst", "v41 combo"]
      tsx: ["data-combo"]

  - id: score_pop_juice
    title: "Score pop flottant juice"
    axis: juice
    owner: aria
    status: pending
    priority: 70
    acceptance:
      - "Animation score-float sur .gem-crush__score-pop"
    detect:
      css: ["score-float", "v41 score pop"]

  - id: audio_layers
    title: "SFX match/combo plus présents (WebAudio)"
    axis: audio
    owner: aria
    status: pending
    priority: 65
    acceptance:
      - "Gain match distinct dans useGemAudio"
      - "Combo oscille plus vite à chaque palier"
    detect:
      tsx: ["useGemAudio", "kind === 'match'"]

  - id: obstacles_ice
    title: "Obstacles gelée sur cases"
    axis: obstacles
    owner: shared
    status: pending
    priority: 60
    acceptance:
      - "Type cellule gelée dans engine"
      - "Style visuel gel sur plateau"
    detect:
      css: ["frozen", "ice", "gel"]
      tsx: ["frozen", "ice"]

  - id: world_map_scroll
    title: "Map monde scrollable"
    axis: progression
    owner: aria
    status: pending
    priority: 55
    acceptance:
      - "Carte scroll horizontal ou vertical"
    detect:
      css: ["map-world", "scroll"]

  - id: scripted_levels
    title: "20 niveaux scriptés"
    axis: progression
    owner: shared
    status: pending
    priority: 50
    acceptance:
      - "levelConfig couvre 20 niveaux distincts"
    detect:
      tsx: ["levelConfig"]

  - id: animated_tutorial
    title: "Tutoriel animé (flèches, ghost swap)"
    axis: tutorial
    owner: aria
    status: pending
    priority: 45
    acceptance:
      - "Overlay tutoriel avec animation hint"
    detect:
      css: ["tutorial", "ghost-swap"]
      tsx: ["showTutorial"]

  - id: illustrated_assets
    title: "Assets illustrés PNG/WebP"
    axis: polish
    owner: ouvrier
    status: pending
    priority: 40
    acceptance:
      - "Sprites raster ou WebP en prod"
    detect:
      tsx: [".png", ".webp", "Image"]