# Operator pitfalls — lessons from real incidents. SSOT for ARIA + IDE agents.
# Sync to canonical_facts on material changes. Curator: IDE assistant.

pitfalls:
  - id: env-sync-no-redeploy
    severity: critical
    lesson: >
      Mettre a jour une variable sur Render (sync-render) ne recharge PAS le process Python
      deja en marche. /x status ou /github status peuvent afficher "non" alors que Render
      a les bonnes valeurs.
    fix: >
      Toujours redeploy apres sync env. sync-render.ps1 et sync-vanguard.ps1 forcent
      le redeploy depuis 2026-06-19. Sinon dashboard Render > Manual Deploy.
    verify: "GET /api/health → aria_x.post_configured et aria_github.configured"
    never: "Dire a l'operateur que c'est bon sans health check ou redeploy."

  - id: x-keys-never-in-vault
    severity: high
    lesson: >
      Les cles X OAuth ont longtemps ete vides dans production.env alors qu'un tweet
      existait sur @Aria_ZHC (post manuel ou automation compte, pas API backend).
    fix: >
      4 cles OAuth + optionnel Bearer dans production.env → sync-render.ps1.
      /x status doit afficher Publication oui + verification @Aria_ZHC.
    verify: "/x status sur Telegram ou check-aria-status.ps1"
    never: "Confondre tweet visible sur X avec API connectee au backend."

  - id: comms-posted-false-positive
    severity: medium
    lesson: >
      comms_skill renvoyait posted:true pour un brouillon X (pas d'URL status).
    fix: "posted:true seulement si reponse contient x.com/.../status/"
    verify: "test_comms_skill_x.py"
    never: "Annoncer publication X sans URL de tweet ou preuve skill."

  - id: llm-fake-deploy
    severity: critical
    lesson: >
      LLM libre inventait commits et deploys sans action GitHub reelle.
    fix: >
      holding_site skill execute + technical_claims reject_fake_technical_success.
      Phrases type « lancer le site holding » ou patch Vanguard = skill GitHub verifie.
    verify: "Lien commit GitHub dans reponse skill, pas projection LLM."
    never: "Succes commit/deploy sans github_commit_sha ou audit_complete dans data skill."

  - id: local-bot-stale-env
    severity: medium
    lesson: >
      backend/.env local sans X/GITHUB repondait avec de faux « cles manquantes »
      si un bot Telegram local tournait en parallele du webhook Render.
    fix: "sync-local.ps1 fusionne les secrets operateur depuis production.env"
    verify: "Ne pas lancer uvicorn local avec le meme bot token que prod sans les memes secrets."
    never: "Polling Telegram local + webhook prod sur le meme token."

  - id: telegram-webhook-empty-ssl-api
    severity: critical
    lesson: >
      SITE_BASE_URL=api.ariavanguardzhc.com avec SSL casse → webhook Telegram vide ou
      livraison impossible. getWebhookInfo.url vide, ARIA ne repond plus.
    fix: >
      Fallback SITE_BASE_URL sur URL Render (test-1-nwf2.onrender.com), setWebhook manuel
      ou redeploy, puis sync-render.ps1. Repasser sur api.* quand DNS+SSL verifies.
    verify: "getWebhookInfo.url non vide + POST /api/telegram/webhook → 200"
    never: "Laisser SITE_BASE_URL sur un domaine dont /api/health echoue en SSL."

  - id: telegram-webhook-redeploy-race
    severity: critical
    lesson: >
      Au redeploy Render, l'ancienne instance appelait delete_webhook au shutdown — apres que la
      nouvelle ait setWebhook → getWebhookInfo.url vide, ARIA muette malgre health OK.
    fix: >
      aria-core: ne plus delete_webhook dans stop_telegram_bot ; setWebhook manuel si besoin ;
      pin aria-core + redeploy aria-vanguard.
    verify: "getWebhookInfo.url = test-1-nwf2.onrender.com/... + pending_update_count = 0"
    never: "Redeployer sans verifier getWebhookInfo apres — health aria_telegram ne suffit pas."

  - id: telegram-avatar-flood-control
    severity: medium
    lesson: >
      setMyProfilePhoto Telegram a un flood control strict — X peut reussir pendant que
      Telegram echoue (RetryAfter). L'ancien code affichait toujours ✅.
    fix: >
      Attendre le delai indique puis /avatar apply. Messages honnetes Telegram ✅/— + erreur.
    verify: "/avatar apply affiche statut reel ; X ✅ et Telegram — si flood actif"
    never: "Annoncer sync Telegram OK sans verifier le retour apply_avatar_sync."

  - id: secrets-not-in-git
    severity: high
    lesson: >
      production.env et local.env ne doivent jamais etre commites. Coffre = %LOCALAPPDATA%\\GoldenFar\\vault.
    fix: "aria-vanguard/operator sur chaque PC + cle Render dans coffre + git pull avant session"
    verify: "check-aria-status.ps1 aligne Render vs production.env"
    never: "Coller des tokens dans un repo public ou dans le chat sans rotation apres."

  - id: render-pipeline-minutes-exhausted
    severity: high
    lesson: >
      Chaque redeploy Render consomme ~2 min de quota pipeline (plan free). Plusieurs sync-render
      d'affilee epuisent le mois — build_failed instantane (pipeline_minutes_exhausted), prod reste
      sur l'ancien commit.
    fix: >
      build-local.ps1 apres chaque changement code ; deploy-render.ps1 -Reason "..." une seule fois
      quand le lot est pret. Ne pas relancer sync-render si le dernier deploy a echoue sur quota.
    verify: "Render events pipeline_minutes_exhausted absent ; health commit = pin attendu"
    never: "sync-render en rafale apres chaque petit commit ou pin."

  - id: render-autodeploy-truth-ledger-storm
    severity: critical
    lesson: >
      aria-api autoDeploy=yes + truth-ledger GitHub sync sur main (~5 min) = centaines de redeploys
      par jour (new_commit), quota pipeline epuise en quelques jours alors que l'operateur croit
      n'avoir fait que 4-5 deploys manuels.
    fix: >
      set-render-autodeploy.ps1 -Mode off. Deploy manuel deploy-render.ps1 ou workflow GitHub
      render-daily-deploy.yml (1x/jour, ~07h Paris). Secrets repo : RENDER_API_KEY,
      RENDER_SERVICE_ID_ARIA_API.
    verify: "Render autoDeploy=no ; deploys new_commit ~1/jour max ; pipeline < 60 min/mois"
    never: "Laisser autoDeploy=yes sur aria-api avec truth-ledger sync vers main."

  - id: totp-telegram-disabled
    severity: high
    lesson: >
      push-session-manifest -ViaAria ou GOLDENFAR_VAULT_TOTP_VIA_ARIA=1 attend 2 min Telegram
      puis expire — inutile depuis TOTP IDE (chat Grok/Cursor).
    fix: >
      GOLDENFAR_VAULT_TOTP_VIA_ARIA=0 (defaut). Jamais -ViaAria. Code dans le chat → -TotpCode
      ou $env:GOLDENFAR_VAULT_TOTP_CODE. totp_relay RELAY_ENABLED=false en aria-core.
    verify: "Aucune notif Telegram 'Code GoldenFar Vault requis' ; push < 5 s"
    never: "push-session-manifest -ViaAria ni reponse TOTP sur Telegram."

  - id: ollama-30b-on-8gb-vram
    severity: high
    lesson: >
      LLM 30B+ (qwen3-coder:30b, qwen2.5:32b) sur GPU laptop 8 Go VRAM sature RAM/CPU —
      freeze PC, OOM, ARIA inutilisable en local.
    fix: >
      local.env : LLM_MODEL=qwen2.5:14b, ARIA_OLLAMA_NUM_CTX=8192. Variables user :
      OLLAMA_FLASH_ATTENTION=1, OLLAMA_KV_CACHE_TYPE=q8_0. Script optimize-ollama-local.ps1.
      Réserver 30B aux sessions code Cursor/Grok ponctuelles (ollama run manuel).
    verify: "ollama ps montre qwen2.5:14b, GPU < 8 Go, chat ARIA < 30 s"
    never: "LLM_MODEL=*30b* ou *32b* dans local.env sur PC 8 Go VRAM."

  - id: chroma-vector-prod-premature
    severity: medium
    lesson: >
      Activer aria_vector_memory sur Render sans tests locaux ni extra pip [vector] consomme
      disque (~150 Mo modèle) et peut échouer silencieusement (ingest no-op).
    fix: >
      Local : pip install -e ".[dev,vector]", test-vector-memory.ps1 -EnableVector, puis
      build-local avant deploy. Prod : flag false au premier deploy code-only.
    verify: "vector_store_status available=true seulement en local testé"
    never: "ARIA_VECTOR_MEMORY=true sur Render avant validation Phase C locale."

  - id: local-build-before-deploy
    severity: medium
    lesson: >
      Deploy Render sans validation locale gaspille les minutes pipeline et bloque la prod sur un
      vieux SHA alors que GitHub a deja le nouveau code.
    fix: >
      operator/build-local.ps1 (pip + import + npm) puis deploy-render.ps1. CI GitHub = PR/manuel
      seulement (pas push main) pour economiser Actions.
    verify: "build-local OK + deploy-log.jsonl entree avec raison"
    never: "Deployer sans build-local ni raison documentee dans deploy-render."

new_pc_checklist:
  - "git clone GoldenFarFR/collegue-memoire → %USERPROFILE%\\projets\\collegue-memoire"

  - "git clone GoldenFarFR/aria-skills → projets\\aria-skills puis scripts\\install.ps1"
  - "git clone GoldenFarFR/aria-sandbox, aria-vanguard, collegue-memoire"
  - "Render API key dans coffre keys\\render.api-key"
  - "pull-render.ps1 ou production.env deja rempli → check-aria-status.ps1"
  - "Apres modif code prod : build-local.ps1 puis deploy-render.ps1 -Reason (1 redeploy groupe)"
  - "Apres modif secret seule : deploy-render.ps1 -Reason ou sync-render -SkipRedeploy si quota epuise"

  - id: stripe-webhook-whsec-not-api-key
    severity: high
    lesson: >
      STRIPE_WEBHOOK_SECRET (whsec_) n'est pas une cle API. Il est genere par endpoint
      dans Dashboard > Developers > Webhooks > Signing secret. Sans whsec_, le checkout
      Stripe peut reussir mais l'abonnement DEXPulse Pro ne s'active pas (webhook 400).
    fix: >
      Creer endpoint HTTPS /api/billing/webhook avec les 4 events subscription/checkout.
      Copier whsec_ dans coffre production.env → operator/sync-render.ps1.
      Doc: aria-vanguard/operator/stripe/README.md.
    verify: "GET /api/health → billing.stripe_webhook_configured=true"
    never: "Confondre sk_test_ avec whsec_ ou melanger mode test et live."

  - id: spark-routing-fallback
    severity: high
    lesson: >
      Spark (Virtuals Compute) est un credit temporaire — pas un remplacement durable de Groq/xAI.
      Couper le financement Virtuals ne doit pas bloquer ARIA.
    fix: >
      enable-spark-routing.ps1 (virtuals primaire) garde LLM_FALLBACK_API_KEY=Groq.
      Retour : disable-spark-routing.ps1 restaure snapshot pre-spark.
      IMAGE_API_KEY (Grok Imagine) reste xAI — Spark ne couvre pas les images.
    verify: "LLM_PROVIDER=virtuals + fallback groq ; test chat ; acp compute status limitRemaining"
    never: "Supprimer Groq.txt ou LLM_FALLBACK_API_KEY quand Spark est actif."

  - id: acp-keychain-local-only
    severity: high
    lesson: >
      acp-cli stocke OAuth + signers dans le keychain OS (Windows Credential Manager).
      Render/prod n'a pas acces a ce keychain — ARIA prod ne peut pas executer acp directement.
    fix: >
      Sidecar local : vanguard/operator/acp-events-listener.ps1 + heartbeat acp_provider_poll.
      Env : ARIA_ACP_PROVIDER_ENABLED=true, ARIA_ACP_EVENTS_FILE=%LOCALAPPDATA%\GoldenFar\acp-events.jsonl.
      Ne pas utiliser openclaw-acp (deprecie) — @virtuals-protocol/acp-cli uniquement.
    verify: "Telegram « acp status » → agent + offerings ; health aria_acp.cli_available"
    never: "Annoncer marketplace ACP actif sans listener + test job submit."

  - id: acp-events-listen-v2-500
    severity: medium
    lesson: >
      acp events listen (v2 seul) peut crasher avec Server error 500 (viem) cote Virtuals.
      acp job list peut echouer pareil. Legacy socket connecte souvent.
    fix: >
      vanguard/operator/acp-events-listener.ps1 -Mode legacy (defaut).
      Si v2 revient : -Mode v2 ou all. Verifier acp-listener.log.err.
    verify: "acp events listen --legacy → Listening for events... connected."
    never: "Laisser le listener v2 en boucle de crash sans basculer legacy."

  - id: acp-browse-api-500
    severity: medium
    lesson: >
      acp browse (marketplace search) renvoie souvent HTTP 500 cote Virtuals — pas de donnees
      agents/offres en temps reel. L'intelligence marche via cache + heuristiques gaps.
    fix: >
      Commande « scan marché acp » ; cache data/memory/acp_market_scan.json ; heartbeat
      acp_market_scan quotidien. Relancer quand API revient.
    verify: "scan marché acp → source live ou cache + gaps audit_security / veille_zhc"
    never: "Inventer des stats marketplace sans browse OK ni cache valide."

  - id: acp-privy-500-degraded-mode
    severity: high
    lesson: >
      browse, job list/history, events listen, and provider submit all fail with Server error 500
      (Privy/Alchemy Virtuals). No CLI workaround until their backend signs again.
    fix: >
      Degraded mode: heartbeat acp_email_watch (10 min) + command "prepare job acp 0x…"
      (local deliverable JSON in data/memory/acp_prepared/) → paste in Hermes UI.
      Watch agents.world email + Hermes console. When Privy recovers, listener + poll resume.
    verify: "prepare job acp 0x… offering analyse_lite_x1 contract 0x… → JSON + saved file"
    never: "Claim job delivered without Hermes submit or job id receipt."

  - id: premature-external-pr
    severity: high
    lesson: >
      PR upstream (ex. Virtual-Protocol/acp-cli-demos Showcase) ouverte alors que le travail est
      encore en test, preuve schema-only sans job escrow, ou gate validateur/receipt incomplet.
      Credibilite Spark/DevRel degradee ; reviewer temps gaspille.
    fix: >
      SSOT collegue-memoire/sessions/PR-READINESS-NORM.md — gate S1-S6 Showcase avant gh pr create.
      Package sur branche fork GoldenFarFR/* sans PR tant que gate incomplet. Fermer PR premature
      avec commentaire honnete ; rouvrir seulement quand receipt job id + validate OK.
    verify: "Gate checklist signee ; pas de PR ouverte si un item manque"
    never: "Appeler livre une PR non mergee ; envoyer proof sans job id pour Showcase."

  - id: avatar-change-on-redeploy
    severity: high
    lesson: >
      Apres redeploy Render, Telegram/X affichaient une nouvelle photo alors que l'echeance
      style est 14 jours. Cause : is_due() retournait True si next_due_at absent dans
      style_refresh.json ; heartbeat visual_autonomy + ARIA_VISUAL_AUTO_APPLY generaient
      et publiaient un nouveau style Imagine au boot (~30s).
    fix: >
      bootstrap_style_schedule() au startup (main.py) — initialise next_due_at sans changer
      l'avatar. is_due() = False si next_due_at absent. Cycle auto uniquement quand
      next_due_at depasse (14j). Manuel : /avatar style now (force).
    verify: "Apres redeploy : /avatar style status → is_due=false, photo X/TG inchangee"
    never: "Traiter un redeploy comme une echeance style — deploy != nouveau look."

  - id: stale-dexpulse-knowledge
    severity: critical
    lesson: >
      Le cerveau ARIA (canonical_facts, FAQ, persona, founder_ping) citait encore DEXPulse
      comme produit live alors que le repo et le service Render ont ete supprimes le 2026-06-19.
      Initiatives Telegram proposaient des campagnes marketing DEXPulse — hallucination produit.
    fix: >
      SSOT = canonical_facts.yaml (aria-market-product, dexpulse-retired). Apres toute decision
      produit : sync canonical → faq.yaml → redeploy Render. Verifier proactive.py et persona.md.
      POST /api/aria/truth-ledger/sync-canonical ou restart backend.
    verify: "FAQ « What is DEXPulse? » → RETIRED ; founder_ping ne cite pas DEXPulse comme live"
    never: "Promouvoir, deployer ou marketer DEXPulse apres 2026-06-19."

  - id: secrets-via-vault-not-inline
    severity: critical
    lesson: >
      Ne jamais ecrire de secrets en clair dans backend/.env, le chat Cursor, ou le code.
      SSOT = coffre (%LOCALAPPDATA%\GoldenFar\vault\production.env) et notes perso
      (secure-keys\config\secure\*.txt). Propagation via scripts (sync-local, sync-render).
    fix: >
      import-secure-x-keys.ps1 pour X ; puis sync-local.ps1 (dev) et sync-render.ps1 (prod).
      Variables: GOLDENFAR_VAULT, SECURE_KEYS_ROOT.
    verify: "check-aria-status.ps1 — cles presentes, valeurs non affichees"
    never: >
      Copier-coller bearerToken/apiKey dans .env ou dans le chat ; dupliquer manuellement
      les memes secrets dans plusieurs fichiers.

  - id: x-automation-golden-rule
    severity: critical
    lesson: >
      Compte @Aria_ZHC automatisé : la règle d'or est de ne jamais se faire suspendre ou bannir.
      L'API X autorise jusqu'à 100 POST /2/tweets par 15 min (OAuth user), mais le spam ou les
      rafales déclenchent 429 puis risque de restriction compte. ARIA applique des plafonds plus
      stricts (5/15 min, 24/jour, 1h entre posts, pas de duplicata 48h, jamais d'URL auto).
    fix: >
      Respecter x_publication_policy.py (golden rule non contournable). Après 429, cooldown
      automatique via x-rate-limit-reset. Ne pas monter X_MAX_POSTS_PER_DAY au-delà de 50.
      Publier via intent URL si urgence opérateur hors quota.
    verify: "/x policy — limites affichées ; tweet auto bloqué si <1h depuis dernier post"
    never: >
      Rafale de tweets promo ACP, URLs dans tweets auto (~0,20 $ + spam), ou bypass force=True
      des garde-fous plateforme.

  - id: spark-catalog-grok-only-2026-07-04
    severity: high
    lesson: >
      Virtuals a retire Claude Opus (et DeepSeek) du catalogue Spark le 2026-07-04.
      Seul Grok 4 (x-ai-grok-4-3) reste disponible sur compute.virtuals.io.
      Les appels develop/brief avec anthropic-claude-opus-4-8 ou deepseek retournent vide ou erreur.
    fix: >
      ecosystem_registry.yaml : DEVELOP/BRIEF/STANDARD = x-ai-grok-4-3.
      Relancer enable-spark-chiron.ps1 ou enable-spark-routing.ps1 puis sync-render + deploy-render.
      verify-spark-routing.ps1 et verify_spark_ssot.py doivent etre verts.
    verify: "verify_spark_ssot.py exit 0 ; API Virtuals ping model=x-ai-grok-4-3 reponse non vide"
    never: "Laisser ARIA_LLM_MODEL_DEVELOP=opus en prod apres retrait catalogue."

repos_ssot:
  brain: GoldenFarFR/aria-sandbox/packages/aria-core
  deploy_host: GoldenFarFR/aria-vanguard
  operator_scripts: GoldenFarFR/aria-vanguard/operator
  skills: GoldenFarFR/aria-skills
  holding_site: GoldenFarFR/aria-vanguard
  operator_memory: GoldenFarFR/collegue-memoire