# Alimentation Letta — imprégnation ARIA + anti-hallucination (SSOT)
version: 1

letta:
  passage_prefix: "[aria]"
  max_passage_chars: 880
  max_passages_per_run: 200
  cache_subdir: aria_grounding
  state_file: sync-aria-grounding-state.json

canonical_facts:
  path: packages/aria-core/src/aria_core/truth_ledger/canonical_facts.yaml
  tag: truth/canonical

epistemic_policies:
  path: packages/aria-core/src/aria_core/knowledge/epistemic_core.yaml
  tag: epistemic/policy

vision_docs:
  - VISION.md
  - packages/aria-core/src/aria_core/knowledge/aria_values.yaml
  - packages/aria-core/src/aria_core/knowledge/aria_goals.yaml

operator_pitfalls:
  path: packages/aria-core/src/aria_core/knowledge/operator_pitfalls.yaml
  tag: pitfall

grounding_block:
  label: grounding
  max_chars: 4000

# Spark develop (Opus) — synthèse mémoire Letta au-delà du copier-coller statique
spark_enrichment:
  enabled: true
  model_depth: develop
  cache_subdir: spark_letta
  passage_prefix: "[spark/letta-memory]"
  max_passages: 24
  # Ordre imprint : grounding statique → spark enrich → ACP