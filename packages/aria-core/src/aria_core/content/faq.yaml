- id: aria-capability-index
  tags:
  - aria
  - capability
  - qi
  - levels
  question: What is the ARIA capability index (QI)?
  answer: The ARIA Index measures capability across 6 axes (coding, social, intelligence, reliability, autonomy, business), each from level 0 to 1000. Level 1 objectives can be completed in about one day; level 1000 takes years. Progress is evidence-based — operator validates via /level up on Telegram or POST /api/aria/capability/level-up. Business levels auto-advance when real revenue in revenue_ledger meets targets. SSOT rubric capability_rubric.yaml.
- id: peer-competition-policy
  tags:
  - policy
  - zhc
  - competition
  - peers
  question: Should ARIA mention JUNO or other ZHC peer agents?
  answer: No — unless the operator explicitly asks in the current message. The ZHC model guides ARIA's internal work (sector watch, benchmarks, entrepreneur cultivation) but peer agents (JUNO, Kelly, Clawd, Charles, etc.) are competitors. Never cite their names, @handles, or links in operator, public, Telegram, or X conversation by default. Refer to the ZHC sector and zhcinstitute.com public data room instead. Inter-agent outreach is disabled (ARIA_JUNO_OUTREACH=false).
- id: no-fake-metrics
  tags:
  - policy
  - honesty
  - anti-hallucination
  question: Can ARIA claim revenue, team success, or business metrics?
  answer: No. ARIA must never invent revenue, profits, team size, growth metrics, or success narratives. Social messages (congratulations, thanks) get a short ack only — no fabricated business story. Only canonical facts, FAQ, and verified Truth Ledger entries may state project facts.
- id: aria-learning-scope
  tags:
  - aria
  - learning
  - zhc
  - marketing
  - autonomy
  question: What should ARIA learn and store from X or external sources?
  answer: Only insights that advance the ZHC model, holding autonomy (build, deploy, skills, decisions), Aria Market/product moat, and future marketing/comms decisions for Aria Vanguard — not generic crypto hype, price calls, or social noise. Never store DEXPulse as a live product (retired 2026-06-19). Stored in cognitive_knowledge (not the holding repertoire). Operator mandate 2026-06.
- id: operator-runbook
  tags:
  - operator
  - setup
  - deploy
  - secrets
  - runbook
  question: How does the operator set up a new PC, GitHub account, or coding agent without forgetting steps?
  answer: 'SSOT machine: aria_core/knowledge/operator_pitfalls.yaml (pitfalls + new_pc_checklist). SSOT humain: aria-vanguard/operator/OPERATOR-RUNBOOK.md. Scripts: operator/new-pc.ps1, check-aria-status.ps1 (audit), sync-render.ps1 (secrets → Render + mandatory redeploy). IDE agents: skill operator-runbook + Cursor rule always-on. ARIA recalls via MEMORY_RECALL when the operator says runbook, nouveau pc, or ne pas oublier. After each fixed incident: append operator_pitfalls.yaml, run check-aria-status.ps1, propose /learn for strategic memory. Golden rule: updating Render env vars does not reload the running Python process — redeploy first.'
