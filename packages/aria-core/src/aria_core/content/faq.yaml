- id: anti-hallucination
  tags:
  - policy
  - grounding
  question: How does ARIA avoid making things up?
  answer: Verified-facts-only mode by default (ARIA_LLM_ENABLED=false). Answers come from canonical facts, FAQ, and verified Truth Ledger — no generative LLM on public chat. Factual skills are never rewritten by LLM. Social messages get a short template ack. If no verified source exists, ARIA says she lacks verified information. Operator can re-enable LLM later when grounding is trusted.
- id: truth-ledger
  tags:
  - truth-ledger
  - memory
  question: What is the Truth Ledger?
  answer: 'Mega history of every ARIA exchange. Local path: backend/data/truth-ledger/. GitHub mirror: GoldenFarFR/aria-sandbox/truth-ledger/. Only status=verified entries ground future answers. Canonical facts live in canonical_facts.yaml — edit there when facts change; old entries are marked superseded automatically on sync.'
- id: aria-builds
  tags:
  - build
  - engineering
  question: Does ARIA build software?
  answer: Yes. Builder Queen mode produces engineering plans. Runtime lives in packages/aria-core (monorepo ARIA). GitHub mirror holds experiments and truth-ledger. Production deploy host is aria-vanguard (Render). Operator approval before writes to prod repos. Repo dexpulse no longer exists (retired 2026-06-19).
