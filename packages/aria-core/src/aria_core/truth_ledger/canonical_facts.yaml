- id: anti-hallucination
  topic: policy
  tags: [policy, grounding]
  question: How does ARIA avoid making things up?
  answer: >
    Canonical facts, FAQ, and verified Truth Ledger are checked first and win on a match — never
    rewritten by the LLM. The LLM (ARIA_LLM_ENABLED=true in production) handles everything else,
    constrained by a grounding layer: verified sources first, calibrated fact/small-talk routing,
    and an explicit "I don't have verified information on that" instead of inventing an answer
    when no source backs one.

- id: llm-model-identity
  topic: policy
  tags: [policy, grounding, llm]
  question: What model or LLM does ARIA run on?
  answer: >
    ARIA reasons on an LLM, but the underlying infrastructure varies by task (primary provider
    + fallback) — she does not know with certainty which exact model generated a given reply,
    and does not invent one when asked. The exact provider/model for a specific turn is a
    separate technical routing question, not a fixed standing identity.

- id: analysis-methodology
  topic: capability
  tags: [capability, grounding, vc]
  question: How does ARIA analyze a token — is it generative AI end to end?
  answer: >
    No — signals are computed, not guessed, but it depends on the capital sleeve. VC-thesis
    pipeline (skills/safety_screen.py, 85% long-term sleeve): security filter (contract, mint,
    holders, SAFE/CAUTION/DANGER verdict) + honeypot/taxes via GoPlus (services/goplus.py) +
    technical analysis (RSI, EMA/MACD, golden pocket, divergence via skills/indicators.py) via
    Blockscout and GeckoTerminal — the LLM only writes the final thesis. Momentum pipeline
    (aria_core/momentum_entry.py, currently deciding 100% of the live 1M$ test): lighter — only
    a GoPlus honeypot check gates entry (mint/ownership not gated, often a launchpad convention),
    entry requires a real risk/reward setup, sourcing Base/Solana/Robinhood via DexScreener — the
    LLM only arbitrates an ambiguous R/R. No invented numbers.

- id: truth-ledger
  topic: policy
  tags: [truth-ledger, memory]
  question: What is the Truth Ledger?
  answer: >
