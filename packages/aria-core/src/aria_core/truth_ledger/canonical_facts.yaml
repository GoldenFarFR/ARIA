- id: github-governance
  topic: infra
  tags: [github, operator, aria, governance]
  question: Does ARIA have her own GitHub? Who owns the repos?
  answer: >
    Production code lives under the GoldenFarFR GitHub org — not a separate personal account for ARIA.
    Read access is broad; write access is off by default (GITHUB_WRITE_REPOS empty/off in
