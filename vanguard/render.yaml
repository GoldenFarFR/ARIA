# Aria Vanguard ZHC â€” holding stack (vitrine + API ARIA)
# Secrets: operator/production.env (coffre) + operator/sync-render.ps1
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: aria-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    disk:
      name: aria-api
      mountPath: /app/backend/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /app/backend/data
      - key: DEBUG
        value: "false"
      - key: SERVE_FRONTEND
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        value: Aria_ZHC_Bot
      - key: TELEGRAM_ADMIN_USERNAME
        value: golderfarfr
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: ARIA_PUBLIC_MODE
        value: "false"
      - key: ARIA_GROUNDED_MODE
        value: "true"
      - key: ARIA_LLM_TEMPERATURE
        value: "0.2"
      - key: ARIA_LLM_ENHANCE_SKILLS
        value: "false"
      - key: ARIA_LLM_ENABLED
        value: "false"
      - key: ACCESS_CODE_ENABLED
        value: "true"
      - key: SESSION_TTL_HOURS
        value: "24"
      - key: ALERT_COOLDOWN_HOURS
        value: "4"
      - key: ARIA_AUTONOMOUS
        value: "true"
      - key: ARIA_JUNO_OUTREACH
        value: "false"
      - key: ARIA_X_HANDLE
        value: Aria_ZHC
      - key: SITE_BASE_URL
        value: https://test-1-nwf2.onrender.com
      - key: HOLDING_DOMAIN
        value: ariavanguardzhc.com
      - key: CORS_ORIGINS
        value: https://ariavanguardzhc.com,https://www.ariavanguardzhc.com,https://test-1-nwf2.onrender.com
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_JWT_VERIFICATION_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: GoldenFarFR
      - key: GITHUB_SANDBOX_REPO
        value: aria-sandbox
      - key: GITHUB_TOKEN_REPO
        value: ""
      - key: GITHUB_READ_REPOS
        value: "*"
      - key: GITHUB_WRITE_REPOS
        value: "*"
      - key: GITHUB_EXCLUDED_REPOS
        value: ""
      - key: GITHUB_PROTECTED_REPOS
        value: aria-vanguard,aria-sandbox,template-grok-cursor,aria-skills

  - type: web
    name: aria-api
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_PRODUCT_URL
        value: https://api.ariavanguardzhc.com
      - key: VITE_PRODUCT_API_URL
        value: https://api.ariavanguardzhc.com/api
      - key: VITE_PRIVY_APP_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html