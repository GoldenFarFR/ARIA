# Vitrine ZHC (statique) — apex ariavanguardzhc.com (+ www).
# Sert le build Vite de vanguard/ (dist/) :
#   /         -> vitrine ZHC (VanguardSite, public)
#   /reports  -> page produit publique (ClientSite)
#
# Le PRODUIT/API reste sur api.ariavanguardzhc.com (site nginx `aria-api`) —
# ce fichier n'y touche JAMAIS.
#
# ── Installation (UNE seule fois) ────────────────────────────────────────────
#   1) cp vanguard/nginx/vitrine.conf /etc/nginx/sites-available/vitrine
#   2) ln -sf /etc/nginx/sites-available/vitrine /etc/nginx/sites-enabled/vitrine
#   3) ./vanguard/deploy-vitrine.sh          # build + publie dans le webroot + reload
#   4) certbot --nginx -d ariavanguardzhc.com    # (ajoute -d www.ariavanguardzhc.com
#                                                #  UNIQUEMENT si le DNS www existe)
#      -> certbot ajoute tout seul le bloc `listen 443 ssl` + la redirection http->https
#         et gère le renouvellement. Après ça, ce fichier vit sous gestion certbot ;
#         les déploiements suivants ne relancent QUE deploy-vitrine.sh (aucun edit nginx).
#
# NB : server_name exact (ariavanguardzhc.com) l'emporte sur le `default_server`
#      d'Ubuntu — donc l'apex bascule proprement de la page « Welcome to nginx »
#      vers la vitrine, sans toucher au site `default`.

server {
    listen 80;
    listen [::]:80;
    server_name ariavanguardzhc.com www.ariavanguardzhc.com;

    root /var/www/ariavanguardzhc;
    index index.html;

    # En-têtes de sécurité (repris du _headers de la vitrine).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Fallback SPA : /reports, un reload, un lien partagé, un bookmark ->
    # on sert index.html (200) et React prend le relais côté client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
