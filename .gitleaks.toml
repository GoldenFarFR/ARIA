title = "ARIA gitleaks config"

# Extends the default gitleaks ruleset (hundreds of known secret patterns +
# generic high-entropy detectors) -- we only add allowlist entries on top,
# never replace the base rules.
[extend]
useDefault = true

[allowlist]
description = "Known false positives, verified by hand (23/07 audit) -- never real secrets."
paths = [
  # detect-secrets baseline: contains SHA1 *hashes* of already-reviewed
  # findings, never raw values (field name is literally `hashed_secret`,
  # 40 hex chars = SHA1 digest) -- regenerated regularly by the
  # detect-secrets tool, would otherwise re-trigger hundreds of false
  # positives on every update to this file.
  '''\.secrets\.baseline''',
  # Deliberate corpus of attack payloads (forged JWTs, SQLi strings, auth
  # bypass attempts) used to test our own security-sim detectors -- these
  # are fabricated examples, not real credentials.
  '''vanguard/backend/security_sim/corpus\.py''',
  # Flaunch client tests (24/07): real Base contract/pool/tx addresses used
  # as fixtures for parsing tests -- on-chain data, public by nature (never
  # a secret, unlike an API key). Flagged only by the generic high-entropy
  # detector on hex strings, same false-positive class already present
  # (unallowlisted) in test_clanker_client.py/test_dexscreener_client.py/
  # test_agent_wallet_monitor.py -- scoped here rather than widened to all
  # of tests/, to keep this allowlist narrow and each entry individually
  # justified.
  '''packages/aria-core/tests/test_flaunch_client\.py''',
  # Same false-positive class (24/07, bonding-entry chantier): a real
  # deployer wallet address, copied from a live-verified Virtuals API
  # payload into a fixture (test_parse_virtual_bonding_entry_native_fields)
  # -- an on-chain address, public by nature, never a secret.
  '''packages/aria-core/tests/test_virtuals_client\.py''',
]
